<!DOCTYPE html>
<html lang="en">
<head>

<body>
    <fieldset>
        <legend>Form Pemesanan</legend>
        <form action=""  method="post">

        <p><label for="namaPembeli">Nama Pembeli: <input type="text" autocomplete="additional-name" placeholder="masukan nama pembeli"></label></p>
        <p><label for="namaBarang">Nama Barang: <input type="text" placeholder="masukan nama barang"></label></p>
        <p>Kategori Cucian:
            <select name="" id="">
                <option value="">Cuci Kering</option>
                <option value="">Cuci Setrika</option>
                <option value="">Cuci Mamel</option>
            </select>
        </p>
        <p><label for="JumlahBarang">Jumlah: <input type="number" min="1" max="20"></label> <label for="">kilo</label></p>
        <p><label for="HargaBarang">Harga: <input type="text" placeholder="masukan harga"></label></p>
        <p><label for="tanggalMasuk">Tanggal Masuk: <input type="date"></label></p>
        <p><label for="">Keterangan:</label><textarea name="" id=""></textarea></p>
        <button type="submit">Kirim</button>
    </form>
    </fieldset>
