<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Transaksi</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <header class="navbar">
  <div class="logo">
    <img src="logoBersih.png" alt="logo">
  </div>

    <div class="box">
          <form class="search-box">
            <input type="text" id="searchInput" placeholder="Cari disini">
            <button type="submit" class="icons">
              <i class="fas fa-search"></i>
            </button>
          </form>
    </div>
<button id="btnFilter"><i class="fas fa-filter"></i> Filter</button>
  <nav>
    <a href="index.html">Dashboard</a>
    <a href="transaksi.html">Transaksi</a>
     <a href="daftarTransaksi.html">Daftar Transaksi</a>
    <a href="#">Pelanggan</a>
  </nav>
 
<div class="filter-box hidden" id="filterBox">
  <h3>Filter</h3>

  <h4>Kategori</h4>
  <label><input type="checkbox" value="Cuci" class="filter-kategori"> Cuci</label><br>
  <label><input type="checkbox" value="Cuci + Setrika" class="filter-kategori"> Cuci + Setrika</label><br>
  <label><input type="checkbox" value="Setrika" class="filter-kategori"> Setrika</label>

  <h4>Harga</h4>
  <label><input type="checkbox" value="above" class="filter-harga"> > Rp 10.000</label><br>
  <label><input type="checkbox" value="below" class="filter-harga"> < Rp 10.000</label>

  <h4>Tanggal</h4>
  <input type="date" id="tglAwal"><br>
  <input type="date" id="tglAkhir"><br><br>

  <button id="applyFilter">Terapkan</button>
</div>
<div id="popupEdit" class="popup hidden">
  <div class="popup-content">
    <h3>Edit Status</h3>
    <select id="editStatus">
      <option>Baru Masuk</option>
      <option>Diproses</option>
      <option>Selesai</option>
    </select>
    <button id="saveEdit">Simpan</button>
    <button id="cancelEdit">Batal</button>
  </div>
</header>
<h2>Daftar Transaksi</h2>
<table border="1">
  <thead>
    <tr>
        <th>No</th>
      <th>Nama</th>
      <th>Layanan</th>
      <th>Berat</th>
      <th>Tanggal Masuk</th>
        <th>Tanggal Ambil</th>
      <th>Total</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>


</div>

<script src="script.js"></script>
</body>
</html>
